name: Build menu

# Ξαναχτίζει το index.html όποτε αλλάζει το μενού της ημέρας ή η βάση πιάτων,
# και το δημοσιεύει (GitHub Pages). Ο ιδιοκτήτης απλώς επεξεργάζεται το
# menu-today.txt (ακόμη κι από το κινητό μέσω GitHub) και πατά Commit.

on:
  push:
    branches: [main]
    paths:
      - "menu-today.txt"
      - "DAILY_MENU.xlsx"
      - "build-source/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-menu
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet openpyxl
      - name: Build index.html
        working-directory: build-source
        run: python build.py
      - name: Commit rebuilt index.html
        run: |
          git config user.name "merci-menu-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Δεν άλλαξε κάτι στο index.html."
          else
            git commit -m "Auto-rebuild μενού ημέρας [skip ci]"
            git push
          fi
